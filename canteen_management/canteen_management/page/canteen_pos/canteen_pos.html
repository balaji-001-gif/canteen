<div id="canteen-pos-root">
  <div class="pos-layout">
    <!-- Left: Item Panel -->
    <div class="pos-left">
      <div class="pos-search-bar">
        <i class="search-icon">🔍</i>
        <input type="text" id="item-search" placeholder="Search items by name or barcode..." autocomplete="off">
      </div>
      <div id="category-list" class="category-bar"></div>
      <div id="item-grid" class="item-grid">
        <div class="pos-loading"><div class="spinner"></div> Loading items...</div>
      </div>
    </div>

    <!-- Right: Cart Panel -->
    <div class="pos-right">
      <div class="cart-header">
        <h4>Current Order <span class="cart-count" id="cart-count" style="display:none;">0</span></h4>
        <div style="display:flex; gap:8px; flex-direction:column;">
          <input type="text" id="customer-name" placeholder="Customer name (optional)">
          <div class="employee-row" style="display:none;">
            <input type="text" id="employee-field" class="form-control" placeholder="Employee ID (required for Wallet)">
          </div>
        </div>
      </div>

      <div id="cart-items" class="cart-items-list">
        <div class="cart-empty">
          <p>No items yet.<br>Tap an item to add it to the order.</p>
        </div>
      </div>

      <div class="cart-totals">
        <div class="total-row"><span>Subtotal</span><span id="subtotal">₹0.00</span></div>
        <div class="total-row"><span>Tax</span><span id="tax-total">₹0.00</span></div>
        <div class="total-row grand"><span>Total</span><span id="grand-total">₹0.00</span></div>
      </div>

      <div class="cart-payment">
        <select id="payment-mode">
          <option value="Cash">Cash</option>
          <option value="Card">Card</option>
          <option value="UPI">UPI</option>
          <option value="Wallet">Wallet</option>
          <option value="Credit">Credit</option>
        </select>
        <input type="number" id="paid-amount" placeholder="Amount tendered (₹)" min="0" step="0.01">
        <div id="change-display" class="change-display" style="display:none;"></div>
      </div>

      <div class="cart-actions">
        <button id="btn-clear" class="btn btn-clear">🗑️ Clear</button>
        <button id="btn-pay" class="btn btn-pay" disabled>✓ Place Order</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="pos-toast-container" id="pos-toast-container"></div>

<!-- Receipt modal -->
<div class="pos-modal-overlay" id="receipt-modal">
  <div class="pos-modal-box">
    <div class="pos-modal-header">
      <h3>Receipt</h3>
      <button class="pos-modal-close" id="receipt-close">✕</button>
    </div>
    <div class="receipt-body" id="receipt-body"></div>
    <div class="receipt-footer">Thank you for your visit!</div>
  </div>
</div>

<!-- Quantity modal -->
<div class="pos-modal-overlay" id="qty-modal">
  <div class="pos-modal-box" style="width: 320px;">
    <div class="qty-modal-content">
      <div class="item-label" id="qty-item-label"></div>
      <div class="qty-controls">
        <button class="qty-big-btn" id="qty-minus">−</button>
        <div class="qty-display" id="qty-display">1</div>
        <button class="qty-big-btn" id="qty-plus">+</button>
      </div>
      <button class="qty-confirm-btn" id="qty-confirm">Add to Order</button>
    </div>
  </div>
</div>
